

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"/>
    <title>webquiz</title>
  </head>
  <body>
    <nav>
      <img src="./assets/Movie.png" alt="Logo" class="logo-img" />
      
      
      <ul class="nav-icons">
        <li class="nav-icon">
            <img src="./assets/Shape.png" alt="Home" /></li>
        <li class="nav-icon">
            <img src="./assets/Shape1.png" alt="Movies" /></li>
        <li class="nav-icon active">
            <img src="./assets/tv.png" alt="TV" /></li>
        <li class="nav-icon">
          <img src="./assets/Bookmark.png" alt="Bookmarks" />
        </li>
      </ul>
      <div class="avatar">
        <img src="./assets/oval.png" alt="User Avatar" />
      </div>
    </nav>

    <main class="main">
      <form class="search-container">
        <img src="./assets/Search.png" alt="search" class="search-logo" />

        <input
          type="text"
          class="search-input"
          placeholder="Search For TV Series"
        />
      </form>

      <section class="series-section" id="seriesId">
        <h2 class="page-title">TV Series</h2>
        <div class="movies-grid" id="seriesGrid"></div>
      </section>
    </main>

    <script src="func.js"></script>
  </body>
</html>
